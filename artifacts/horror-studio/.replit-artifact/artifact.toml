kind = "web"
previewPath = "/"
title = "Horror Animation Studio"
version = "1.0.0"
id = "artifacts/horror-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22705

[services.development]
run = "pnpm --filter @workspace/horror-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/horror-studio", "run", "build" ]
publicDir = "artifacts/horror-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22705"
BASE_PATH = "/"
